  .section { font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.03em; margin:4px 0 10px; text-transform:uppercase; }
  .target-group{border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:10px}.target-group-title{font-size:16px;font-weight:600;color:var(--teal);margin-bottom:8px}.target-item{border-top:1px solid #edf1f2;padding:10px 0}.target-group-title + .target-item{border-top:0}.target-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.target-name{font-weight:500}.stage{display:inline-block;background:var(--teal-soft);color:var(--teal);border-radius:99px;padding:1px 7px;font-size:12px;margin-right:4px}.session-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}.session-list button{font-size:13px;padding:7px 12px;border-radius:999px}.session-list button.selected{background:#075442!important;color:#fff!important;border:2px solid #043b2f!important;box-shadow:0 0 0 3px #c7eadf,0 4px 10px rgba(4,59,47,.38);font-weight:600}.add-attempt{border:1px dashed #9acdbf;background:#f3fbf8}.score-heading{font-weight:600;color:var(--teal);margin-bottom:2px}.score-row{border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center}.student{font-weight:600}.meta{font-size:13px;color:var(--muted);margin-top:1px}.score-control{display:flex;align-items:center;gap:4px}.score-value{min-width:40px;color:var(--teal);font-weight:600;text-align:center}.icon-btn{background:transparent;border:0;cursor:pointer;font-size:17px;padding:4px 6px;color:var(--muted);border-radius:7px;box-shadow:none}.icon-btn.edit:hover{background:var(--teal-soft);color:var(--teal)}.empty{color:var(--muted);font-size:14px;padding:8px 0}.readonly{color:var(--danger);background:var(--danger-soft);border-radius:8px;padding:9px;font-size:14px;margin-bottom:10px}.overlay{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(20,45,44,.38)}.overlay.show{display:flex}.modal{width:100%;max-width:400px;padding:20px;background:var(--white)}.modal h3{margin:0 0 8px;font-size:18px}.modal-actions{display:flex;gap:10px;margin-top:16px}.modal-actions button{flex:1;width:auto}.toast{position:sticky;bottom:12px;display:none;padding:10px;border-radius:8px;text-align:center;margin-top:12px;font-size:14px}.toast.ok{display:block;background:var(--teal-soft);color:var(--teal)}.toast.err{display:block;background:var(--danger-soft);color:var(--danger)}

  <div class="overlay" id="score-overlay"><div class="modal"><h3>บันทึกคะแนน</h3><div class="meta" id="score-modal-detail"></div><div class="field" style="margin-top:12px"><label id="score-modal-label" for="score-modal-value">คะแนน</label><input id="score-modal-value" type="number" min="0" step="0.01"></div><div class="modal-actions"><button class="ghost" id="score-modal-cancel">ยกเลิก</button><button class="primary" id="score-modal-save">บันทึก</button></div></div></div>

<script type="module">
import { sb, requireAuth, signOut, getProfile, getActiveYear, setActiveYear, distinctYears, competencyStageForGrade, getStudentPlacements } from "../supabase-client.js";
const session=await requireAuth();
if(!session){
  // requireAuth กำลังพาไปหน้า login — ไม่เริ่มโค้ดของหน้านี้และไม่โยน error ลง console
}else{
document.getElementById("btn-signout").addEventListener("click",e=>{e.preventDefault();signOut();});
const profile = await getProfile(session.user.id);
const isAdmin = profile && profile.role === "admin";
let assessments = [];
let current = null;
let targets = [];
let sessions = [];
let currentSession = null;
let currentTarget = null;
let sessionStudents = [];
let scoreMap = new Map();
let assessmentMembers = [];
const $ = id => document.getElementById(id);

function esc(v) {
  return String(v == null ? "" : v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function toast(msg, ok=true) {
  const el = $("toast");
  el.textContent = msg;
  el.className = "toast " + (ok ? "ok" : "err");
  setTimeout(() => el.className = "toast", 4500);
}
function canEdit() {
  return current && (isAdmin || current.owner_id === session.user.id);
}
function fill(sel, rows, label, placeholder) {
  sel.innerHTML = "<option value=''>" + placeholder + "</option>";
  for (const r of rows) {
    const o = document.createElement("option");
    o.value = r.id || r;
    o.textContent = label(r);
    sel.appendChild(o);
  }
}

const STAGE_LABELS = {
  "ช่วงชั้น 1": "ช่วงชั้นที่ 1 (ป.1–ป.3)",
  "ช่วงชั้น 2": "ช่วงชั้นที่ 2 (ป.4–ป.6)",
  "ช่วงชั้น 3": "ช่วงชั้นที่ 3 (ม.1–ม.3)"
};

// ใส่ชั้น/ห้องของปีรายการประเมินให้รายชื่อ โดยไม่ใช้ข้อมูลชั้นปัจจุบันแทนปีเก่า
// หาก placement ขาดไป ก็ยังคืนรายชื่อนักเรียนไว้ครบ เพราะ snapshot คือความจริงของครั้งประเมิน
function applyYearPlacements(students, placements) {
  const byStudentId = new Map((placements || []).map(placement => [placement.student_id, placement]));
  return (students || []).filter(Boolean).map(student => {
    const placement = byStudentId.get(student.id);
    return {
      ...student,
      grade_level: placement ? placement.grade_level : "",
      classroom: placement ? placement.classroom : "",
      placementMissing: !placement
    };
  });
}

// รายชื่อสมาชิกกิจกรรมต้องอ่านชั้น/ห้องตามปีของรายการ ไม่ใช่ students.grade_level ปัจจุบัน
async function loadAssessmentMembersForYear(assessmentId, year) {
  const { data, error } = await sb.from("competency_assessment_members")
    .select("student_id, student:student_id(id,student_no,name,grade_level,classroom)")
    .eq("assessment_id", assessmentId);
  if (error) return { data: [], error };

  const studentIds = (data || []).map(member => member.student_id).filter(Boolean);
  const placementResult = await getStudentPlacements(year, studentIds);
  if (placementResult.error) return { data: [], error: placementResult.error };

  const historicalStudents = applyYearPlacements(
    (data || []).map(member => member.student),
    placementResult.data
  );
  const byStudentId = new Map(historicalStudents.map(student => [student.id, student]));
  return {
    data: (data || []).map(member => ({ ...member, student: byStudentId.get(member.student_id) || null })),
    error: null
  };
}

function availableStagesForAssessment(memberRows, targetRows, sessionRows) {
  const memberStages = new Set((memberRows || [])
    .map(member => member.student && competencyStageForGrade(member.student.grade_level))
    .filter(Boolean));
  const targetStages = new Set((targetRows || [])
    .map(target => target.element && target.element.stage)
    .filter(Boolean));
  const targetStageById = new Map((targetRows || []).map(target => [target.id, target.element && target.element.stage]));
  // ครั้งประเมินที่มีอยู่แล้วต้องยังเข้าถึงได้ แม้นักเรียนเลื่อนชั้นหรือ placement ของปีนั้นขาด
  const sessionStages = new Set((sessionRows || [])
    .map(session => targetStageById.get(session.target_id))
    .filter(Boolean));
  return ["ช่วงชั้น 1", "ช่วงชั้น 2", "ช่วงชั้น 3"]
    .filter(stage => targetStages.has(stage) && (memberStages.has(stage) || sessionStages.has(stage)));
}

// แสดงเฉพาะช่วงชั้นที่มีทั้งนักเรียนผู้เข้าร่วมและองค์ประกอบให้ประเมินจริง
function renderStageOptions() {
  const select = $("f-stage");
  const previous = select.value;
  if (!current) {
    select.innerHTML = "<option value=''>— เลือกกิจกรรมก่อน —</option>";
    select.disabled = true;
    return;
  }
  const available = availableStagesForAssessment(assessmentMembers, targets, sessions);
  select.innerHTML = "<option value=''>" + (available.length ? "— เลือกช่วงชั้น —" : "— ไม่มีช่วงชั้นที่ลงคะแนนได้ —") + "</option>";
  for (const stage of available) {
    const option = document.createElement("option");
    option.value = stage;
    option.textContent = STAGE_LABELS[stage];
    select.appendChild(option);
  }
  select.disabled = available.length === 0;
  if (available.includes(previous)) select.value = previous;
}

async function init() {
  const [a, subj] = await Promise.all([
    sb.from("competency_assessments").select("*").order("created_at", { ascending:false }),
    sb.from("subjects").select("year")
  ]);
  assessments = a.data || [];
  const years = [...new Set([
    ...distinctYears(subj.data || []),
    ...assessments.map(a => a.year).filter(Boolean)
  ])].sort().reverse();
  fill($("f-year"), years, x => x, "— เลือกปี —");
  $("f-year").value = getActiveYear() || years[0] || "";
  renderAssessments();
}

function renderAssessments() {
  const y = $("f-year").value;
  const term = $("f-term").value;
  const t = $("f-type").value;
  const keep = $("sel-assessment").value;
  const rows = assessments.filter(a => (!y || a.year === y) && term && a.term === term && (!t || a.source_type === t));
  fill($("sel-assessment"), rows, a => a.name + " · " + a.source_type, term ? "— เลือกรายการ —" : "— เลือกภาคเรียนก่อน —");
  if (rows.some(a => a.id === keep)) $("sel-assessment").value = keep;
}

async function selectAssessment() {
  const id = $("sel-assessment").value;
  current = assessments.find(a => a.id === id) || null;
  currentSession = null;
  currentTarget = null;
  $("scores-card").style.display = "none";
  if (!current) {
    assessmentMembers = [];
    renderStageOptions();
    $("targets-wrap").style.display = "none";
    return;
  }
  const [t, s] = await Promise.all([
    sb.from("competency_assessment_targets")
      .select("*, competency:competency_id(*), element:element_id(*)")
      .eq("assessment_id", id).order("seq"),
    sb.from("competency_assessment_sessions")
      .select("*").eq("assessment_id", id).order("attempt_no")
  ]);
  if (t.error || s.error) {
    toast("โหลดองค์ประกอบหรือครั้งประเมินไม่สำเร็จ: " + (t.error || s.error).message, false);
    return;
  }
  targets = t.data || [];
  sessions = s.data || [];
  const membersResult = await loadAssessmentMembersForYear(current.id, current.year);
  if (membersResult.error) {
    toast("โหลดผู้เข้าร่วมตามปีการศึกษาไม่สำเร็จ: " + membersResult.error.message, false);
    return;
  }
  assessmentMembers = membersResult.data;
  renderStageOptions();
  $("targets-wrap").style.display = "block";
  renderTargets();
}

function renderTargets() {
  const el = $("target-list");
  el.innerHTML = "";
  const stage = $("f-stage").value;
  if (!stage) {
    el.innerHTML = "<div class='empty'>เลือกช่วงชั้นที่ต้องการลงคะแนนก่อน</div>";
    return;
  }
  const visibleTargets = targets.filter(target => target.element && target.element.stage === stage);
  if (!visibleTargets.length) {
    el.innerHTML = "<div class='empty'>รายการนี้ยังไม่มีองค์ประกอบสำหรับ" + esc(stage) + "</div>";
    return;
  }
  const groups = new Map();
  for (const target of visibleTargets) {
    const id = target.competency_id || target.id;
    if (!groups.has(id)) groups.set(id, { name:target.competency && target.competency.name, items:[] });
    groups.get(id).items.push(target);
  }
  for (const group of groups.values()) {
    const container = document.createElement("div");
    container.className = "target-group";
    container.innerHTML = "<div class='target-group-title'>" + esc(group.name || "สมรรถนะหลัก") + "</div>";
    for (const target of group.items) {
      const item = document.createElement("div");
      item.className = "target-item";
      item.innerHTML =
        "<div class='target-head'><div class='target-name'>" +
        esc(target.element && target.element.name) +
        "</div><div class='meta'>เต็ม " + esc(target.max_score) + "</div></div>";
      const list = document.createElement("div");
      list.className = "session-list";
      const attempts = sessions
        .filter(s => s.target_id === target.id)
        .sort((a,b) => a.attempt_no - b.attempt_no);
      for (const attempt of attempts) {
        const button = document.createElement("button");
        const isCurrent = currentSession && currentSession.id === attempt.id;
        button.className = "ghost" + (isCurrent ? " selected" : "");
        button.textContent = "ครั้งที่ " + attempt.attempt_no;
        button.setAttribute("aria-pressed", isCurrent ? "true" : "false");
        button.onclick = () => loadSession(attempt.id);
        list.appendChild(button);
      }
      if (canEdit()) {
        const add = document.createElement("button");
        add.className = "ghost add-attempt";
        add.textContent = "+ เพิ่มครั้งที่";
        add.onclick = () => createSession(target);
        list.appendChild(add);
      }
      item.appendChild(list);
      container.appendChild(item);
    }
    el.appendChild(container);
  }
}

async function createSession(target) {
  if (!current || !canEdit()) {
    toast("คุณไม่มีสิทธิ์เพิ่มครั้งประเมิน", false);
    return;
  }
  const membersResult = await loadAssessmentMembersForYear(current.id, current.year);
  if (membersResult.error) {
    toast("โหลดผู้เข้าร่วมตามปีการศึกษาไม่สำเร็จ: " + membersResult.error.message, false);
    return;
  }
  assessmentMembers = membersResult.data;
  const matching = assessmentMembers.map(member => member.student).filter(student =>
    student && competencyStageForGrade(student.grade_level) === target.element.stage
  );
  if (!matching.length) {
    toast("ไม่มีผู้เข้าร่วมใน" + target.element.stage + "สำหรับองค์ประกอบนี้", false);
    return;
  }
  const attemptNo = sessions
    .filter(s => s.target_id === target.id)
    .reduce((max, s) => Math.max(max, Number(s.attempt_no) || 0), 0) + 1;
  const { data:newSession, error } = await sb.from("competency_assessment_sessions")
    .insert({ assessment_id:current.id, target_id:target.id, attempt_no:attemptNo })
    .select().single();
  if (error) {
    toast("สร้างครั้งประเมินไม่สำเร็จ: " + error.message, false);
    return;
  }
  const { error:snapErr } = await sb.from("competency_assessment_session_students")
    .insert(matching.map(student => ({ session_id:newSession.id, student_id:student.id })));
  if (snapErr) {
    await sb.from("competency_assessment_sessions").delete().eq("id", newSession.id);
    toast("บันทึกรายชื่อไม่สำเร็จ: " + snapErr.message, false);
    return;
  }
  sessions.push(newSession);
  await loadSession(newSession.id);
  toast("สร้าง" + (target.element && target.element.name || "องค์ประกอบ") + " ครั้งที่ " + attemptNo + " แล้ว");
}

async function loadSession(id) {
  currentSession = sessions.find(s => s.id === id) || null;
  currentTarget = currentSession && targets.find(t => t.id === currentSession.target_id) || null;
  if (!currentSession || !currentTarget) {
    toast("ไม่พบองค์ประกอบของครั้งประเมินนี้", false);
    return;
  }
  const [stu, sc] = await Promise.all([
    sb.from("competency_assessment_session_students").select("student:student_id(*)").eq("session_id", id),
    sb.from("competency_assessment_scores").select("*").eq("session_id", id).eq("target_id", currentTarget.id)
  ]);
  if (stu.error || sc.error) {
    toast("โหลดคะแนนไม่สำเร็จ: " + (stu.error || sc.error).message, false);
    return;
  }
  const snapshotStudents = (stu.data || []).map(row => row.student).filter(Boolean);
  const placementResult = await getStudentPlacements(current.year, snapshotStudents.map(student => student.id));
  sessionStudents = applyYearPlacements(snapshotStudents, placementResult.data);
  if (placementResult.error) {
    toast("โหลดชั้น/ห้องของปี " + current.year + " ไม่สำเร็จ แต่ยังแสดงรายชื่อในครั้งประเมินครบ", false);
  }
  scoreMap = new Map((sc.data || []).map(x => [x.student_id, x.raw_score]));
  $("score-heading").textContent = (currentTarget.competency && currentTarget.competency.name || "สมรรถนะหลัก") + " · ครั้งที่ " + currentSession.attempt_no;
  $("score-subheading").textContent = (currentTarget.element && currentTarget.element.name || "องค์ประกอบ") + " · " + (currentTarget.element && currentTarget.element.stage || "") + " · เต็ม " + currentTarget.max_score;
  $("scores-card").style.display = "block";
  $("readonly").style.display = canEdit() ? "none" : "block";
  renderTargets();
  renderScores();
}

function renderScores() {
  const el = $("score-list");
  el.innerHTML = "";
  if (!sessionStudents.length) {
    el.innerHTML = "<div class='empty'>ไม่มีนักเรียนในครั้งประเมินนี้</div>";
    return;
  }
  const sorted = [...sessionStudents].sort((a,b) =>
    (a.grade_level || "").localeCompare(b.grade_level || "") ||
    (a.classroom || "").localeCompare(b.classroom || "") ||
    String(a.student_no || "").localeCompare(String(b.student_no || ""), undefined, { numeric:true })
  );
  for (const student of sorted) {
    const value = scoreMap.has(student.id) ? scoreMap.get(student.id) : "";
    const row = document.createElement("div");
    row.className = "score-row";
    row.innerHTML =
      "<div><div class='student'>" + esc(student.name) + "</div>" +
      "<div class='meta'>" + esc(student.placementMissing ? "ไม่พบชั้น/ห้อง ปี " + current.year : student.grade_level + "/" + student.classroom) +
      " · " + esc(student.student_no) + "</div></div>" +
      "<div class='score-control'><span class='score-value'>" + (value === "" ? "—" : esc(value)) + "</span></div>";
    if (canEdit()) {
      const edit = document.createElement("button");
      edit.className = "icon-btn edit";
      edit.textContent = "✎";
      edit.title = "แก้ไขคะแนน";
      edit.setAttribute("aria-label", "แก้ไขคะแนน");
      edit.onclick = () => openScoreModal(student, currentTarget, value);
      row.querySelector(".score-control").appendChild(edit);
    }
    el.appendChild(row);
  }
}
let editingScore=null;
function openScoreModal(student,target,value){editingScore={student,target};$("score-modal-detail").textContent=student.name+" · "+(target.competency&&target.competency.name||"สมรรถนะหลัก");$("score-modal-label").textContent=(target.element&&target.element.name||"องค์ประกอบ")+" (เต็ม "+target.max_score+")";$("score-modal-value").value=value;$("score-modal-value").max=target.max_score;$("score-overlay").classList.add("show");setTimeout(()=>$("score-modal-value").focus(),0);}
function closeScoreModal(){$("score-overlay").classList.remove("show");editingScore=null;}
$("score-modal-cancel").onclick=closeScoreModal;$("score-overlay").addEventListener("click",event=>{if(event.target===$("score-overlay"))closeScoreModal();});
$("score-modal-save").onclick=async()=>{if(!editingScore||!currentSession)return;const input=$("score-modal-value"),raw=Number(input.value),target=editingScore.target;if(input.value===""||!Number.isFinite(raw)||raw<0||raw>Number(target.max_score)){toast("คะแนนต้องอยู่ระหว่าง 0 ถึง "+target.max_score,false);input.focus();return;}const button=$("score-modal-save");button.disabled=true;const {error}=await sb.from("competency_assessment_scores").upsert({session_id:currentSession.id,target_id:target.id,student_id:editingScore.student.id,raw_score:raw,updated_at:new Date().toISOString()},{onConflict:"session_id,target_id,student_id"});button.disabled=false;if(error){toast("บันทึกคะแนนไม่สำเร็จ: "+error.message,false);return;}closeScoreModal();await loadSession(currentSession.id);toast("บันทึกคะแนนแล้ว");}
$("f-year").onchange=()=>{setActiveYear($("f-year").value);renderAssessments();$("sel-assessment").value="";selectAssessment()};
$("f-term").onchange=()=>{renderAssessments();$("sel-assessment").value="";selectAssessment()};
$("f-type").onchange=()=>{renderAssessments();if(!$("sel-assessment").value)selectAssessment();};
$("f-stage").onchange=()=>{currentSession=null;currentTarget=null;$("scores-card").style.display="none";renderTargets();};
$("sel-assessment").onchange=selectAssessment;
init();
}
</script>
</body>
</html>
