<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สรุปคะแนน — หลักสูตรสมรรถนะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f2a2e;
    --muted: #5f6b70;
    --line: #dfe4e3;
    --teal: #0f6e56;
    --teal-soft: #e1f5ee;
    --amber: #93690f;
    --amber-soft: #faf1dd;
    --bg: #f7f8f7;
    --white: #ffffff;
    --danger: #a32d2d;
    --danger-soft: #fceaea;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Sarabun", sans-serif;
    color: var(--ink);
    background: var(--bg);
    margin: 0;
    padding: 16px;
    font-size: 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  header h1 { font-size: 20px; font-weight: 600; margin: 4px 0; }
  header p { color: var(--muted); margin: 0 0 8px; font-size: 14px; }
  header .nav { font-size: 14px; margin: 0 0 16px; display: flex; gap: 16px; }
  header .nav a { color: var(--teal); text-decoration: none; font-weight: 500; }

  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 15px; }
  select {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    color: var(--ink);
  }
  select:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .hint { color: var(--muted); font-size: 14px; }

  .student-card { padding: 0; overflow: hidden; }
  .student-head {
    padding: 14px 16px;
    background: var(--teal-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .student-head .name { font-weight: 600; font-size: 16px; }
  .student-head .meta { color: var(--muted); font-size: 13px; }

  .section { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 14px;
  }
  .score-row .val { color: var(--muted); }
  .score-row.total { font-weight: 600; font-size: 15px; color: var(--ink); margin-top: 4px; padding-top: 8px; border-top: 1px dashed var(--line); }
  .score-row.total .val { color: var(--ink); }

  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .comp-item { font-size: 13px; }
  .comp-item .val { font-weight: 600; color: var(--ink); }

  .result-line { display: flex; align-items: center; justify-content: space-between; }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
  }
  .badge.good  { background: var(--teal-soft);  color: var(--teal); }
  .badge.mid   { background: var(--amber-soft); color: var(--amber); }
  .badge.bad   { background: var(--danger-soft); color: var(--danger); }
  .result-note { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .warn-note {
    background: var(--amber-soft);
    color: var(--amber);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>สรุปคะแนน + ผลการเรียน</h1>
    <p>เลือกวิชาและนักเรียน เพื่อดูคะแนนรวมและผลการเรียน</p>
    <div class="nav">
      <a href="index.html">← กรอกคะแนน</a>
      <a href="attendance.html">เช็คชื่อ →</a>
    </div>
  </header>

  <div class="card">
    <div class="field">
      <label for="sel-subject">วิชา</label>
      <select id="sel-subject"><option value="">— กำลังโหลด —</option></select>
    </div>
    <div class="field">
      <label for="sel-student">นักเรียน</label>
      <select id="sel-student"><option value="">— เลือกวิชาก่อน —</option></select>
    </div>
  </div>

  <div id="result-area"></div>

  <div class="card hint" id="empty-hint">เลือกวิชาเพื่อดูสรุปคะแนน</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ============================================================
// ตั้งค่า Supabase — โปรเจกต์เดียวกับหน้าอื่น
// ============================================================
const SUPABASE_URL = "https://cbfblvsasamxuwgcpmtj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_EEGLPPMa3fIX1aRR6GA3Xw_mF4mh5X0";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// อ้างอิง element ที่ใช้บ่อย
const elSubject   = document.getElementById("sel-subject");
const elStudent   = document.getElementById("sel-student");
const elResult    = document.getElementById("result-area");
const elEmptyHint = document.getElementById("empty-hint");

// เก็บข้อมูลทั้งหมดของวิชาที่กำลังดูอยู่ (โหลดครั้งเดียว คำนวณซ้ำได้หลายคนโดยไม่ต้องยิง query ใหม่)
let currentSubject = null;   // object วิชา
let units = [];              // หน่วยใหญ่ทั้งหมด พร้อม indicators > collections > scores ซ้อนอยู่ข้างใน
let students = [];           // นักเรียนทั้งหมด
let remarksData = [];        // แถว ร. ทั้งหมดของวิชานี้
let sessions = [];           // ครั้งที่เช็คชื่อทั้งหมด พร้อม attendance_records ซ้อนอยู่ข้างใน

// เกณฑ์แปลงเปอร์เซ็นต์คะแนนเป็นเกรด (มาตรฐาน 8 ระดับ ตามที่ยืนยันแล้วใน CLAUDE.md)
function percentToGrade(p) {
  if (p >= 80) return 4;
  if (p >= 75) return 3.5;
  if (p >= 70) return 3;
  if (p >= 65) return 2.5;
  if (p >= 60) return 2;
  if (p >= 55) return 1.5;
  if (p >= 50) return 1;
  return 0;
}

function fillSelect(el, items, getLabel, placeholder) {
  el.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = placeholder;
  el.appendChild(opt0);
  for (const it of items) {
    const o = document.createElement("option");
    o.value = it.id;
    o.textContent = getLabel(it);
    el.appendChild(o);
  }
}

// ---------- โหลดวิชาทั้งหมด ----------
async function loadSubjects() {
  const { data, error } = await sb.from("subjects").select("*").order("created_at");
  if (error) { elResult.innerHTML = "<div class='card hint'>โหลดวิชาไม่สำเร็จ: " + error.message + "</div>"; return; }
  fillSelect(elSubject, data, s => s.name + "  (" + s.level + ")", "— เลือกวิชา —");
}

// ---------- เมื่อเลือกวิชา: โหลดทุกอย่างที่ต้องใช้คำนวณครั้งเดียว ----------
elSubject.addEventListener("change", async () => {
  const id = elSubject.value;
  if (!id) { currentSubject = null; showEmpty("เลือกวิชาเพื่อดูสรุปคะแนน"); return; }

  showEmpty("กำลังโหลดข้อมูล...");

  const { data: subj } = await sb.from("subjects").select("*").eq("id", id).single();
  currentSubject = subj;

  // โหลดหน่วยใหญ่ทั้งหมด (ทั้ง "วิชา" และ "สมรรถนะหลัก") พร้อมโครงสร้างข้างล่างซ้อนมาในคำสั่งเดียว
  const { data: unitData, error: unitErr } = await sb
    .from("units")
    .select("*, indicators(*, collections(*, scores(student_id, raw_score)))")
    .eq("subject_id", id)
    .order("seq");
  if (unitErr) { showEmpty("โหลดโครงสร้างคะแนนไม่สำเร็จ: " + unitErr.message); return; }
  units = unitData || [];

  const { data: studs } = await sb.from("students").select("*").order("student_no");
  students = studs || [];

  const { data: remarks } = await sb.from("remarks").select("*").eq("subject_id", id);
  remarksData = remarks || [];

  const { data: sessionData } = await sb
    .from("attendance_sessions")
    .select("*, attendance_records(*)")
    .eq("subject_id", id);
  sessions = sessionData || [];

  fillSelect(elStudent, students, s => s.name + "  (เลขที่ " + s.student_no + ")", "— ทั้งห้อง —");
  render();
});

elStudent.addEventListener("change", render);

function showEmpty(msg) {
  elResult.innerHTML = "";
  elEmptyHint.textContent = msg;
  elEmptyHint.style.display = "block";
}

// ---------- คำนวณคะแนนของนักเรียน 1 คน จากข้อมูลที่โหลดไว้แล้ว ----------
// สูตรบัญญัติไตรยางศ์ไล่ล่างขึ้นบน ตามที่กำหนดใน CLAUDE.md (ไม่เก็บค่าที่เทียบแล้วลง database)
function computeStudent(studentId) {
  const subjectUnits = [];
  const competencyUnits = [];
  let subjectRaw = 0, subjectCap = 0;

  for (const unit of units) {
    let unitRaw = 0, unitCap = 0;
    for (const ind of (unit.indicators || [])) {
      let indRaw = 0, indCap = 0;
      for (const coll of (ind.collections || [])) {
        indCap += coll.max_score;
        const row = (coll.scores || []).find(s => s.student_id === studentId);
        if (row) indRaw += Number(row.raw_score);
      }
      const indScaled = indCap > 0 ? (indRaw / indCap) * ind.max_score : 0;
      unitRaw += indScaled;
      unitCap += ind.max_score;
    }
    const unitScaled = unitCap > 0 ? (unitRaw / unitCap) * unit.max_score : 0;
    if (unit.kind === "วิชา") {
      subjectUnits.push({ name: unit.name, scaled: unitScaled, max: unit.max_score });
      subjectRaw += unitScaled;
      subjectCap += unit.max_score;
    } else {
      competencyUnits.push({ name: unit.name, scaled: unitScaled, max: unit.max_score });
    }
  }

  const subjectScaled = subjectCap > 0 ? (subjectRaw / subjectCap) * currentSubject.max_score : 0;

  // 1) เช็ค ร. ก่อน
  const remark = remarksData.find(r => r.student_id === studentId && r.code === "ร.");
  if (remark) {
    return { subjectUnits, competencyUnits, subjectScaled, result: { type: "ร.", reason: remark.reason } };
  }

  // 2) เช็ค มส. (เฉพาะมัธยม และต้องมีทั้ง total_periods กับข้อมูลเช็คชื่ออย่างน้อย 1 ครั้ง)
  let attendanceUnavailable = false;
  if (currentSubject.level === "มัธยม") {
    if (!currentSubject.total_periods || sessions.length === 0) {
      attendanceUnavailable = true;
    } else {
      let attended = 0;
      for (const sess of sessions) {
        const rec = (sess.attendance_records || []).find(r => r.student_id === studentId);
        if (!rec) continue; // ยังไม่มีบันทึกของคนนี้ในครั้งนี้ ข้ามไป ไม่นับ
        if (rec.status === "มา" || rec.status === "มาสาย") attended += sess.periods_covered;
        else if (rec.status === "ลาป่วย" || rec.status === "ลากิจ") attended += sess.periods_covered * 0.5;
        // 'ขาด' ไม่นับ (น้ำหนัก 0)
      }
      const percentAttend = (attended / currentSubject.total_periods) * 100;
      if (percentAttend < 80) {
        return { subjectUnits, competencyUnits, subjectScaled, result: { type: "มส.", percentAttend } };
      }
    }
  }

  // 3) แปลงเป็นเกรด
  const percentScore = currentSubject.max_score > 0 ? (subjectScaled / currentSubject.max_score) * 100 : 0;
  const grade = percentToGrade(percentScore);
  return { subjectUnits, competencyUnits, subjectScaled, result: { type: "grade", grade, percentScore }, attendanceUnavailable };
}

// ---------- วาดผลลัพธ์ ----------
function render() {
  if (!currentSubject) return;

  const targetStudents = elStudent.value
    ? students.filter(s => s.id === elStudent.value)
    : students;

  if (targetStudents.length === 0) { showEmpty("ยังไม่มีนักเรียนในระบบ"); return; }

  elEmptyHint.style.display = "none";
  let html = "";

  const missingPeriods = currentSubject.level === "มัธยม" && !currentSubject.total_periods;
  if (missingPeriods) {
    html += "<div class='warn-note'>วิชานี้ยังไม่ได้กำหนดจำนวนคาบเรียนทั้งหมด (total_periods) เลยเช็ค มส. ให้ไม่ได้ — ผลการเรียนด้านล่างข้ามการเช็ค มส. ไปก่อน</div>";
  }

  for (const stu of targetStudents) {
    const r = computeStudent(stu.id);
    html += renderStudentCard(stu, r);
  }

  elResult.innerHTML = html;
}

function renderStudentCard(stu, r) {
  let subjectRows = r.subjectUnits.map(u =>
    "<div class='score-row'><span>" + u.name + "</span><span class='val'>" +
    u.scaled.toFixed(1) + " / " + u.max + "</span></div>"
  ).join("");

  let compGrid = r.competencyUnits.map(u =>
    "<div class='comp-item'>" + u.name + "<br><span class='val'>" + u.scaled.toFixed(1) + " / " + u.max + "</span></div>"
  ).join("");

  let resultHtml;
  if (r.result.type === "ร.") {
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge bad'>ร.</span></div>" +
      "<div class='result-note'>เหตุผล: " + r.result.reason + "</div>";
  } else if (r.result.type === "มส.") {
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge bad'>มส.</span></div>" +
      "<div class='result-note'>เข้าเรียน " + r.result.percentAttend.toFixed(1) + "% (ต่ำกว่า 80%)</div>";
  } else {
    const g = r.result.grade;
    const badgeClass = g >= 3 ? "good" : (g >= 1.5 ? "mid" : "bad");
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge " + badgeClass + "'>เกรด " + g + "</span></div>" +
      "<div class='result-note'>คิดจาก " + r.result.percentScore.toFixed(1) + "% ของคะแนนเต็มวิชา</div>";
  }

  return (
    "<div class='card student-card'>" +
      "<div class='student-head'>" +
        "<span class='name'>" + stu.name + "</span>" +
        "<span class='meta'>เลขที่ " + stu.student_no + (stu.classroom ? " · " + stu.classroom : "") + "</span>" +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>คะแนนวิชา</div>" +
        (subjectRows || "<div class='hint'>ยังไม่มีหน่วยคะแนนวิชา</div>") +
        "<div class='score-row total'><span>รวมวิชา</span><span class='val'>" +
          r.subjectScaled.toFixed(1) + " / " + currentSubject.max_score + "</span></div>" +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>สมรรถนะหลัก 6 ด้าน</div>" +
        (compGrid ? "<div class='comp-grid'>" + compGrid + "</div>" : "<div class='hint'>ยังไม่มีข้อมูลสมรรถนะหลัก</div>") +
      "</div>" +
      "<div class='section'>" + resultHtml + "</div>" +
    "</div>"
  );
}

// เริ่มทำงาน
loadSubjects();
</script>
</body>
</html>
