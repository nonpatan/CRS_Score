<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>เข้าสู่ระบบ — หลักสูตรสมรรถนะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f2a2e;
    --muted: #5f6b70;
    --line: #dfe4e3;
    --teal: #0f6e56;
    --cyan: #48b9c7;
    --teal-soft: #e1f5ee;
    --cyan-soft: #e9f8fa;
    --white: #ffffff;
    --danger: #a32d2d;
    --danger-soft: #fceaea;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Sarabun", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 10% 8%, rgba(72,185,199,.24), transparent 34%),
      radial-gradient(circle at 92% 92%, rgba(15,110,86,.16), transparent 34%),
      linear-gradient(145deg, #f8fcfb 0%, #eef8f6 52%, #f3fbfc 100%);
    margin: 0;
    padding: clamp(16px, 4vw, 40px);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    min-height: 100svh;
    display: grid;
    place-items: center;
    overflow-x: hidden;
  }
  body::before,
  body::after {
    content: "";
    position: fixed;
    width: 220px;
    height: 220px;
    border: 1px solid rgba(15,110,86,.1);
    border-radius: 50%;
    pointer-events: none;
  }
  body::before { top: -115px; right: -80px; }
  body::after { bottom: -130px; left: -70px; width: 280px; height: 280px; }

  .login-shell {
    width: min(100%, 900px);
    display: grid;
    gap: 24px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .brand { text-align: center; padding: 4px 10px; }
  .logo-frame {
    width: 136px;
    height: 136px;
    display: grid;
    place-items: center;
    margin: 0 auto 16px;
    padding: 8px;
    background: rgba(255,255,255,.86);
    border: 1px solid rgba(255,255,255,.92);
    border-radius: 50%;
    box-shadow: 0 18px 40px rgba(24,94,90,.17);
    backdrop-filter: blur(8px);
  }
  .logo { width: 100%; height: auto; display: block; }
  .kicker {
    color: var(--teal); font-size: 12px; font-weight: 600; letter-spacing: .16em;
    margin: 0 0 5px; text-transform: uppercase;
  }
  .brand h1 { font-size: clamp(25px, 4vw, 34px); line-height: 1.25; font-weight: 600; margin: 0; }
  .brand-copy { color: var(--muted); max-width: 440px; margin: 10px auto 0; font-size: 15px; }
  .feature-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 7px; margin-top: 16px; }
  .feature-row span {
    color: var(--teal); background: rgba(255,255,255,.72); border: 1px solid rgba(15,110,86,.12);
    border-radius: 999px; padding: 5px 11px; font-size: 13px;
  }

  .card {
    background: rgba(255,255,255,.94);
    border: 1px solid rgba(255,255,255,.95);
    border-radius: 20px;
    padding: clamp(22px, 5vw, 32px);
    box-shadow: 0 24px 60px rgba(32,75,73,.14), 0 2px 8px rgba(32,75,73,.06);
    backdrop-filter: blur(12px);
  }
  .card-head { margin-bottom: 22px; }
  .card-head .eyebrow { color: var(--teal); font-size: 13px; font-weight: 600; margin: 0 0 2px; }
  .card-head h2 { font-size: 24px; line-height: 1.3; margin: 0; font-weight: 600; }
  .card-head p:last-child { color: var(--muted); font-size: 14px; margin: 5px 0 0; }
  label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 15px; }
  input[type="email"], input[type="password"] {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    min-height: 50px;
    padding: 11px 13px;
    border: 1px solid var(--line);
    border-radius: 11px;
    background: #fbfdfd;
    color: var(--ink);
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
  }
  input::placeholder { color: #98a3a7; }
  input:focus {
    outline: none; border-color: var(--teal); background: var(--white);
    box-shadow: 0 0 0 3px rgba(15,110,86,.12);
  }
  .field { margin-bottom: 16px; }

  button.primary {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    min-height: 50px;
    padding: 12px 16px;
    border: none;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--teal), #138770);
    color: var(--white);
    cursor: pointer;
    margin-top: 2px;
    box-shadow: 0 10px 20px rgba(15,110,86,.22);
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 13px 24px rgba(15,110,86,.27); }
  button.primary:active { transform: translateY(0); }
  button.primary:disabled { opacity: 0.5; cursor: default; }

  .toast {
    text-align: center;
    font-size: 14px;
    padding: 10px;
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }
  .toast.err { display: block; background: var(--danger-soft); color: var(--danger); }
  .toast.ok  { display: block; background: var(--teal-soft); color: var(--teal); }

  .hint { color: var(--muted); font-size: 13px; text-align: center; margin: 14px 8px 0; }

  @media (min-width: 700px) {
    .login-shell { grid-template-columns: minmax(0, 1fr) minmax(350px, 400px); gap: clamp(34px, 7vw, 72px); }
    .brand { text-align: left; padding: 16px 0; }
    .logo-frame { margin-left: 0; }
    .brand-copy { margin-left: 0; }
    .feature-row { justify-content: flex-start; }
  }

  @media (max-width: 420px) {
    body { padding: 12px; }
    .login-shell { gap: 18px; }
    .brand { padding-top: 0; }
    .logo-frame { width: 108px; height: 108px; margin-bottom: 12px; }
    .brand h1 { font-size: 24px; }
    .brand-copy { font-size: 14px; margin-top: 7px; }
    .feature-row { margin-top: 12px; }
    .card { border-radius: 16px; padding: 20px; }
    .card-head { margin-bottom: 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
  }
</style>
</head>
<body>
<main class="login-shell">
  <section class="brand" aria-labelledby="brand-title">
    <div class="logo-frame">
      <img src="logo.png" alt="โลโก้โรงเรียนเจริญศึกษา" class="logo">
    </div>
    <p class="kicker">CRS Score</p>
    <h1 id="brand-title">ระบบเก็บคะแนน<br>หลักสูตรฐานสมรรถนะ</h1>
    <p class="brand-copy">จัดการคะแนน การเข้าเรียน และสมรรถนะของนักเรียนได้สะดวกในที่เดียว</p>
    <div class="feature-row" aria-label="ความสามารถหลักของระบบ">
      <span>คะแนนรายวิชา</span>
      <span>สมรรถนะหลัก</span>
      <span>เช็คชื่อ</span>
    </div>
  </section>

  <section class="login-panel" aria-labelledby="login-title">
    <div class="card">
      <div class="card-head">
        <p class="eyebrow">สำหรับครูและผู้ดูแลระบบ</p>
        <h2 id="login-title">ยินดีต้อนรับ</h2>
        <p>เข้าสู่ระบบเพื่อเริ่มจัดการข้อมูล</p>
      </div>
    <div class="field">
      <label for="f-email">อีเมล</label>
      <input type="email" id="f-email" autocomplete="username" placeholder="ครู@โรงเรียน.ac.th">
    </div>
    <div class="field">
      <label for="f-password">รหัสผ่าน</label>
      <input type="password" id="f-password" autocomplete="current-password">
    </div>
      <button class="primary" id="btn-login">เข้าสู่ระบบ&nbsp; →</button>
    <div class="toast" id="toast"></div>
    </div>

    <p class="hint">ยังไม่มีบัญชี? ติดต่อผู้ดูแลระบบให้สร้างบัญชีให้ก่อน</p>
  </section>
</main>

<script type="module">
import { sb } from "./supabase-client.js";

const fEmail = document.getElementById("f-email");
const fPassword = document.getElementById("f-password");
const btnLogin = document.getElementById("btn-login");
const elToast = document.getElementById("toast");

function showToast(msg, ok) {
  elToast.textContent = msg;
  elToast.className = "toast " + (ok ? "ok" : "err");
}

// รับ next ได้เฉพาะหน้าภายในระบบที่ระบุไว้ ป้องกันลิงก์ login.html?next=https://เว็บปลอม
// ซึ่งอาจใช้ส่งครูต่อไปยังหน้า phishing หลังล็อกอินสำเร็จ
const ALLOWED_NEXT_PAGES = new Set([
  "entry.html", "attendance.html", "summary.html", "manage.html", "students.html",
  "retention.html", "warning.html", "rollover.html", "competency-manage.html",
  "competency-entry.html"
]);

function getSafeNextPage() {
  const raw = new URLSearchParams(location.search).get("next");
  if (!raw) return "entry.html";

  try {
    const target = new URL(raw, location.href);
    const appPath = location.pathname.replace(/[^/]*$/, "");
    const page = target.pathname.split("/").pop();
    if (target.origin !== location.origin || !target.pathname.startsWith(appPath) || !ALLOWED_NEXT_PAGES.has(page)) {
      return "entry.html";
    }
    return page + target.search;
  } catch {
    return "entry.html";
  }
}

// ถ้าล็อกอินอยู่แล้ว ข้ามหน้านี้ไปเลย
const { data: { session } } = await sb.auth.getSession();
if (session) {
  location.href = getSafeNextPage();
}

async function doLogin() {
  const email = fEmail.value.trim();
  const password = fPassword.value;
  if (!email || !password) { showToast("กรอกอีเมลและรหัสผ่านให้ครบ", false); return; }

  btnLogin.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  btnLogin.disabled = false;

  if (error) { showToast("เข้าสู่ระบบไม่สำเร็จ: " + error.message, false); return; }

  showToast("เข้าสู่ระบบสำเร็จ กำลังพาไป...", true);
  location.href = getSafeNextPage();
}

btnLogin.addEventListener("click", doLogin);
fPassword.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
