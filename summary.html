<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สรุปคะแนน — หลักสูตรสมรรถนะ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f2a2e;
    --muted: #5f6b70;
    --line: #dfe4e3;
    --teal: #0f6e56;
    --teal-soft: #e1f5ee;
    --amber: #93690f;
    --amber-soft: #faf1dd;
    --bg: #f7f8f7;
    --white: #ffffff;
    --danger: #a32d2d;
    --danger-soft: #fceaea;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Sarabun", sans-serif;
    color: var(--ink);
    background: var(--bg);
    margin: 0;
    padding: 16px;
    font-size: 16px;
    line-height: 1.6;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  header h1 { font-size: 20px; font-weight: 600; margin: 4px 0; }
  header p { color: var(--muted); margin: 0 0 8px; font-size: 14px; }
  header .nav { font-size: 14px; margin: 0 0 16px; display: flex; gap: 16px; flex-wrap: wrap; }
  header .nav a { color: var(--teal); text-decoration: none; font-weight: 500; }

  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 15px; }
  select {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    color: var(--ink);
  }
  select:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .hint { color: var(--muted); font-size: 14px; }

  .student-card { padding: 0; overflow: hidden; }
  .student-head {
    padding: 14px 16px;
    background: var(--teal-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .student-head .name { font-weight: 600; font-size: 16px; }
  .student-head .meta { color: var(--muted); font-size: 13px; }

  .section { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 14px;
  }
  .score-row .val { color: var(--muted); }
  .score-row.total { font-weight: 600; font-size: 15px; color: var(--ink); margin-top: 4px; padding-top: 8px; border-top: 1px dashed var(--line); }
  .score-row.total .val { color: var(--ink); }

  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .comp-item { font-size: 13px; }
  .comp-item .val { font-weight: 600; color: var(--ink); }

  .result-line { display: flex; align-items: center; justify-content: space-between; }
  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 14px;
  }
  .badge.good  { background: var(--teal-soft);  color: var(--teal); }
  .badge.mid   { background: var(--amber-soft); color: var(--amber); }
  .badge.bad   { background: var(--danger-soft); color: var(--danger); }
  .result-note { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .warn-note {
    background: var(--amber-soft);
    color: var(--amber);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>สรุปคะแนน + ผลการเรียน</h1>
    <p>เลือกวิชาและนักเรียน เพื่อดูคะแนนรวมและผลการเรียน</p>
    <div class="nav">
      <a href="entry.html">กรอกคะแนน</a>
      <a href="attendance.html">เช็คชื่อ</a>
      <a href="manage.html">จัดการโครงสร้าง</a>
      <a href="students.html">นักเรียน</a>
      <a href="retention.html">เรียนซ้ำชั้น</a>
      <a href="rollover.html">ขึ้นปีใหม่</a>
      <a href="#" id="btn-signout">ออกจากระบบ</a>
    </div>
  </header>

  <div class="card">
    <div class="field">
      <label for="filter-year">ปีการศึกษา</label>
      <select id="filter-year"><option value="">— ทุกปี —</option></select>
    </div>
    <div class="field" style="display:flex; gap:12px;">
      <div style="flex:1">
        <label for="filter-grade">ชั้น</label>
        <select id="filter-grade">
          <option value="">— ทุกชั้น —</option>
          <optgroup label="ประถม">
            <option value="ป.1">ป.1</option>
            <option value="ป.2">ป.2</option>
            <option value="ป.3">ป.3</option>
            <option value="ป.4">ป.4</option>
            <option value="ป.5">ป.5</option>
            <option value="ป.6">ป.6</option>
          </optgroup>
          <optgroup label="มัธยม">
            <option value="ม.1">ม.1</option>
            <option value="ม.2">ม.2</option>
            <option value="ม.3">ม.3</option>
            <option value="ม.4">ม.4</option>
            <option value="ม.5">ม.5</option>
            <option value="ม.6">ม.6</option>
          </optgroup>
        </select>
      </div>
      <div style="flex:1">
        <label for="filter-term">ภาคเรียน</label>
        <select id="filter-term">
          <option value="">— ทุกภาคเรียน —</option>
          <option value="1">ภาคเรียน 1</option>
          <option value="2">ภาคเรียน 2</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="sel-subject">วิชา</label>
      <select id="sel-subject"><option value="">— กำลังโหลด —</option></select>
    </div>
    <div class="field">
      <label for="sel-student">นักเรียน</label>
      <select id="sel-student"><option value="">— เลือกวิชาก่อน —</option></select>
    </div>
  </div>

  <div id="result-area"></div>

  <div class="card hint" id="empty-hint">เลือกวิชาเพื่อดูสรุปคะแนน</div>
</div>

<script type="module">
import {
  sb, requireAuth, signOut, getRosterForSubject,
  loadSubjectData, computeSubjectResult, computeIntegratedResult,
  getActiveYear, setActiveYear, distinctYears
} from "./supabase-client.js";

// ต้องล็อกอินก่อนถึงจะใช้หน้านี้ได้ ไม่งั้นเด้งไปหน้า login.html ให้อัตโนมัติ
const session = await requireAuth();
if (!session) throw new Error("redirecting to login");
document.getElementById("btn-signout").addEventListener("click", (e) => { e.preventDefault(); signOut(); });

// อ้างอิง element ที่ใช้บ่อย
const elFilterYear  = document.getElementById("filter-year");
const elFilterGrade = document.getElementById("filter-grade");
const elFilterTerm  = document.getElementById("filter-term");
const elSubject   = document.getElementById("sel-subject");
const elStudent   = document.getElementById("sel-student");
const elResult    = document.getElementById("result-area");
const elEmptyHint = document.getElementById("empty-hint");

// เก็บข้อมูลทั้งหมดของวิชาที่กำลังดูอยู่ (โหลดครั้งเดียว คำนวณซ้ำได้หลายคนโดยไม่ต้องยิง query ใหม่)
let currentSubject = null;   // object วิชา (พื้นฐานหรือบูรณาการก็ได้)
let units = [];               // ใช้กับวิชาพื้นฐาน: หน่วยใหญ่ทั้งหมด พร้อม indicators > collections > scores
let students = [];            // นักเรียนทั้งหมด
let remarksData = [];         // ใช้กับวิชาพื้นฐาน: แถว ร. ทั้งหมดของวิชานี้
let sessions = [];            // ใช้กับวิชาพื้นฐาน: ครั้งที่เช็คชื่อทั้งหมด พร้อม attendance_records
let makeupHours = [];         // ใช้กับวิชาพื้นฐาน: ชั่วโมงชดเชยทั้งหมดของวิชานี้
let integrationMembers = [];  // ใช้กับวิชาบูรณาการ: แถว integration_members พร้อมข้อมูลวิชาพื้นฐานสมาชิก
let memberDataList = [];      // ใช้กับวิชาบูรณาการ: ข้อมูลเต็มของวิชาพื้นฐานสมาชิกแต่ละตัว (units/remarks/sessions)
let allSubjects = [];         // วิชาทั้งหมด (กรองด้วยชั้น/ภาคเรียนก่อนเติมลง dropdown)
let memberIdSet = new Set();  // id ของวิชาพื้นฐานที่เป็นสมาชิกวิชาบูรณาการ (ซ่อนจาก dropdown)

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ป้ายกำกับวิชาในดรอปดาวน์: รหัสวิชา · ชื่อวิชา · ปีการศึกษา (ถ้ามี) · ภาคเรียน (ถ้ามี) · บูรณาการ (ถ้าใช่)
// โชว์ปีเสมอ เพื่อกันเลือกวิชาผิดปีเมื่อมีวิชาชื่อซ้ำหลายปี (ยืนยันกับผู้ใช้แล้ว)
function subjectLabel(s) {
  const parts = [s.code || "(ไม่มีรหัส)", s.name];
  if (s.year) parts.push("ปี " + s.year);
  if (s.term) parts.push("เทอม " + s.term);
  if (s.subject_type === "บูรณาการ") parts.push("บูรณาการ");
  return parts.join("  ·  ");
}

function fillSelect(el, items, getLabel, placeholder) {
  el.innerHTML = "";
  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = placeholder;
  el.appendChild(opt0);
  for (const it of items) {
    const o = document.createElement("option");
    o.value = it.id;
    o.textContent = getLabel(it);
    el.appendChild(o);
  }
}

// ---------- โหลดวิชาทั้งหมด (ทั้งพื้นฐานและบูรณาการ) ----------
async function loadSubjects() {
  const { data, error } = await sb.from("subjects").select("*").order("created_at");
  if (error) { elResult.innerHTML = "<div class='card hint'>โหลดวิชาไม่สำเร็จ: " + error.message + "</div>"; return; }
  allSubjects = data || [];

  // วิชาพื้นฐานที่เป็นสมาชิกของวิชาบูรณาการ ไม่โชว์ใน dropdown (ยืนยันแล้ว 2026-07)
  // — ดูผลผ่านวิชาบูรณาการแทน (การ์ดวิชาบูแสดงผลรายวิชาย่อยข้างในอยู่แล้ว)
  const { data: memberRows, error: memErr } = await sb
    .from("integration_members")
    .select("member_subject_id");
  if (memErr) { elResult.innerHTML = "<div class='card hint'>โหลดข้อมูลวิชาบูรณาการไม่สำเร็จ: " + memErr.message + "</div>"; return; }
  memberIdSet = new Set((memberRows || []).map(r => r.member_subject_id));

  fillYearOptions();
  applySubjectFilter();
}

// ---------- เติมตัวเลือกปีการศึกษาจากวิชาที่มีจริง แล้วตั้งค่าเป็นปีที่เลือกไว้ (จำข้ามหน้า) ----------
function fillYearOptions() {
  const years = distinctYears(allSubjects);
  elFilterYear.innerHTML = "<option value=''>— ทุกปี —</option>";
  for (const y of years) {
    const o = document.createElement("option");
    o.value = y;
    o.textContent = "ปีการศึกษา " + y;
    elFilterYear.appendChild(o);
  }
  const saved = getActiveYear();
  elFilterYear.value = years.indexOf(saved) !== -1 ? saved : "";
}

// ---------- กรองรายชื่อวิชาตามปี/ชั้น/ภาคเรียนที่เลือก แล้วเติมลง dropdown ----------
function applySubjectFilter() {
  const yearFilter = elFilterYear.value;
  const gradeFilter = elFilterGrade.value;
  const termFilter = elFilterTerm.value;
  const filtered = allSubjects.filter(s => {
    if (memberIdSet.has(s.id)) return false; // วิชาย่อยของบูรณาการ ดูผลผ่านวิชาบูแทน
    if (yearFilter && s.year !== yearFilter) return false;
    if (gradeFilter && s.grade_level !== gradeFilter) return false;
    if (termFilter && s.term !== termFilter) return false;
    return true;
  });
  fillSelect(elSubject, filtered, subjectLabel, "— เลือกวิชา (" + filtered.length + " วิชา) —");
}
// เปลี่ยนปี = จำไว้ให้ทุกหน้าใช้ปีเดียวกัน (localStorage) แล้วกรองใหม่
elFilterYear.addEventListener("change", () => { setActiveYear(elFilterYear.value); applySubjectFilter(); elSubject.dispatchEvent(new Event("change")); });
elFilterGrade.addEventListener("change", () => { applySubjectFilter(); elSubject.dispatchEvent(new Event("change")); });
elFilterTerm.addEventListener("change", () => { applySubjectFilter(); elSubject.dispatchEvent(new Event("change")); });

// ---------- เมื่อเลือกวิชา: โหลดทุกอย่างที่ต้องใช้คำนวณครั้งเดียว ----------
elSubject.addEventListener("change", async () => {
  const id = elSubject.value;
  if (!id) { currentSubject = null; showEmpty("เลือกวิชาเพื่อดูสรุปคะแนน"); return; }

  showEmpty("กำลังโหลดข้อมูล...");

  const { data: subj } = await sb.from("subjects").select("*").eq("id", id).single();
  currentSubject = subj;

  if (subj.subject_type === "บูรณาการ") {
    // วิชาบูรณาการ: โหลดรายชื่อวิชาพื้นฐานสมาชิก แล้วโหลดข้อมูลเต็มของแต่ละวิชา
    const { data: memberRows, error: memErr } = await sb
      .from("integration_members")
      .select("*, member:member_subject_id(*)")
      .eq("integrated_subject_id", id);
    if (memErr) { showEmpty("โหลดวิชาย่อยไม่สำเร็จ: " + memErr.message); return; }
    integrationMembers = memberRows || [];
    memberDataList = await Promise.all(integrationMembers.map(m => loadSubjectData(m.member_subject_id)));

    // รายชื่อนักเรียน = รวมนักเรียนที่ลงทะเบียนในวิชาพื้นฐานสมาชิกทุกตัว (เอาแค่ครั้งเดียวต่อคน)
    const rosters = await Promise.all(integrationMembers.map(m => getRosterForSubject(m.member_subject_id)));
    const seen = new Map();
    for (const roster of rosters) for (const s of roster) seen.set(s.id, s);
    students = [...seen.values()].sort((a, b) => (a.student_no || "").localeCompare(b.student_no || ""));
  } else {
    // วิชาพื้นฐาน: โหลดโครงสร้างคะแนน + ร. + เช็คชื่อของตัวเอง + รายชื่อที่ลงทะเบียน
    const data = await loadSubjectData(id);
    units = data.units;
    remarksData = data.remarksData;
    sessions = data.sessions;
    makeupHours = data.makeupHours;
    students = await getRosterForSubject(id);
  }

  fillSelect(elStudent, students, s => s.name + "  (เลขที่ " + s.student_no + ")", "— ทั้งห้อง —");
  render();
});

elStudent.addEventListener("change", render);

function showEmpty(msg) {
  elResult.innerHTML = "";
  elEmptyHint.textContent = msg;
  elEmptyHint.style.display = "block";
}

// computeSubjectResult / computeIntegratedResult / loadSubjectData / percentToGrade
// ย้ายไปอยู่ supabase-client.js แล้ว (ใช้ร่วมกับ retention.html) — ที่นี่เหลือแค่ wrapper
// ผูกกับ state กลางของหน้านี้ (currentSubject/units/remarksData/sessions/makeupHours/memberDataList)
function computeStudent(studentId) {
  return computeSubjectResult(studentId, currentSubject, units, remarksData, sessions, makeupHours);
}

function computeIntegratedStudent(studentId) {
  return computeIntegratedResult(studentId, memberDataList);
}

// ---------- วาดผลลัพธ์ ----------
function render() {
  if (!currentSubject) return;

  const targetStudents = elStudent.value
    ? students.filter(s => s.id === elStudent.value)
    : students;

  if (targetStudents.length === 0) { showEmpty("ยังไม่มีนักเรียนในระบบ"); return; }

  elEmptyHint.style.display = "none";
  let html = "";

  if (currentSubject.subject_type === "บูรณาการ") {
    if (integrationMembers.length === 0) {
      html += "<div class='warn-note'>วิชาบูรณาการนี้ยังไม่มีวิชาพื้นฐานประกอบเลย ไปเพิ่มที่หน้า \"จัดการโครงสร้าง\" ก่อน</div>";
    } else if (integrationMembers.every(m => !m.member.total_periods)) {
      html += "<div class='warn-note'>วิชาพื้นฐานทุกตัวในนี้ยังไม่ได้ตั้งจำนวนคาบเรียน ถัวเฉลี่ยถ่วงน้ำหนักไม่ได้ (คะแนนรวมจะออกมาเป็น 0)</div>";
    }
    for (const stu of targetStudents) {
      const ir = computeIntegratedStudent(stu.id);
      html += renderIntegratedCard(stu, ir);
    }
  } else {
    const missingPeriods = !currentSubject.total_periods;
    if (missingPeriods) {
      html += "<div class='warn-note'>วิชานี้ยังไม่ได้กำหนดจำนวนคาบเรียนทั้งหมด (total_periods) เลยเช็ค มส. ให้ไม่ได้ — ผลการเรียนด้านล่างข้ามการเช็ค มส. ไปก่อน</div>";
    }
    for (const stu of targetStudents) {
      const r = computeStudent(stu.id);
      html += renderStudentCard(stu, r);
    }
  }

  elResult.innerHTML = html;
}

function resultBadgeLabel(res) {
  if (res.type === "ร.") return "ร.";
  if (res.type === "มส.") return "มส.";
  return "เกรด " + res.grade + " (" + res.percentScore.toFixed(0) + "%)";
}

function renderIntegratedCard(stu, ir) {
  // แสดงคาบขาดรายวิชาย่อยด้วย — ครูจะได้เห็นว่าเด็กขาดหนักที่วิชาไหน แล้วไปตามแก้ที่วิชานั้น
  const memberRows = ir.memberResults.map(m => {
    const weightText = m.weight ? m.weight + " คาบ" : "ไม่มีน้ำหนัก";
    const missedText = m.missedPeriods > 0 ? " · ขาด " + m.missedPeriods + " คาบ" : "";
    return "<div class='score-row'><span>" + escapeHtml(m.subject.name) +
      " <span class='hint'>(" + weightText + missedText + ")</span></span><span class='val'>" +
      resultBadgeLabel(m.result) + "</span></div>";
  }).join("");

  // สมรรถนะหลัก: แสดงแยกตามวิชาย่อยที่มีข้อมูลจริง (ไม่ถัวเฉลี่ยรวม เพราะมักกรอกแค่บางวิชา)
  const membersWithComp = ir.memberResults.filter(m => m.competencyUnits.length > 0);
  const competencySection = membersWithComp.map(m => {
    const grid = m.competencyUnits.map(u =>
      "<div class='comp-item'>" + escapeHtml(u.name) + "<br><span class='val'>" + u.scaled.toFixed(1) + " / " + u.max + "</span></div>"
    ).join("");
    return "<div class='hint' style='margin:8px 0 4px'>" + escapeHtml(m.subject.name) + "</div>" +
      "<div class='comp-grid'>" + grid + "</div>";
  }).join("");

  let overallHtml;
  if (ir.overall.type === "มส.") {
    // มส. คิดแบบรวมทั้งวิชาบูรณาการ: ฐาน = คาบรวมทุกวิชาย่อย, ขาดสะสมรวมทุกวิชาย่อย (ยืนยันแล้ว)
    const isRetake = ir.overall.subtype === "retake";
    overallHtml =
      "<div class='result-line'><span>ผลการเรียน (บูรณาการ)</span><span class='badge bad'>มส.</span></div>" +
      "<div class='result-note'>ขาดรวมทุกวิชาย่อย " + ir.overall.missedPeriods + " คาบ จากฐานเวลารวม " +
      ir.overall.totalBase + " คาบ (เพดาน " + ir.overall.maxMissed.toFixed(1) + " คาบ) — " +
      (isRetake
        ? "<b>ต้องเรียนซ้ำรายวิชา</b> (ขาดเกินเพดานเรียนซ้ำแล้ว ชั่วโมงชดเชยช่วยไม่ได้)"
        : "เรียนเพิ่มเติมให้ครบเวลาได้" +
          (ir.overall.makeupTotal > 0 ? " — ชดเชยไปแล้ว " + ir.overall.makeupTotal + " คาบ (ขาดสุทธิเหลือ " + ir.overall.netMissed + " คาบ) ยังไม่พอ" : "")) +
      "</div>";
  } else if (ir.overall.type === "ร.") {
    overallHtml =
      "<div class='result-line'><span>ผลการเรียน (บูรณาการ)</span><span class='badge bad'>ร.</span></div>" +
      "<div class='result-note'>มีวิชาย่อยอย่างน้อย 1 วิชาติด ร.</div>";
  } else {
    const g = ir.overall.grade;
    const badgeClass = g >= 3 ? "good" : (g >= 1.5 ? "mid" : "bad");
    overallHtml =
      "<div class='result-line'><span>ผลการเรียน (บูรณาการ)</span><span class='badge " + badgeClass + "'>เกรด " + g + "</span></div>" +
      "<div class='result-note'>ถัวเฉลี่ยถ่วงน้ำหนักด้วยจำนวนคาบเรียนของวิชาย่อย = " + ir.overall.percentScore.toFixed(1) + "%" +
      (ir.overall.makeupTotal > 0 ? " · ขาดไม่เกินเพดานแล้วหลังนับชั่วโมงชดเชย " + ir.overall.makeupTotal + " คาบ" : "") + "</div>";
  }

  return (
    "<div class='card student-card'>" +
      "<div class='student-head'>" +
        "<span class='name'>" + escapeHtml(stu.name) + "</span>" +
        "<span class='meta'>เลขที่ " + stu.student_no + (stu.classroom ? " · " + stu.classroom : "") + "</span>" +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>วิชาพื้นฐานที่ประกอบกัน</div>" +
        (memberRows || "<div class='hint'>ไม่มีวิชาย่อย</div>") +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>สมรรถนะหลัก 6 ด้าน (ตามวิชาย่อยที่กรอกไว้)</div>" +
        (competencySection || "<div class='hint'>ยังไม่มีวิชาย่อยไหนกรอกสมรรถนะหลักไว้</div>") +
      "</div>" +
      "<div class='section'>" + overallHtml + "</div>" +
    "</div>"
  );
}

function renderStudentCard(stu, r) {
  let subjectRows = r.subjectUnits.map(u =>
    "<div class='score-row'><span>" + u.name + "</span><span class='val'>" +
    u.scaled.toFixed(1) + " / " + u.max + "</span></div>"
  ).join("");

  let compGrid = r.competencyUnits.map(u =>
    "<div class='comp-item'>" + u.name + "<br><span class='val'>" + u.scaled.toFixed(1) + " / " + u.max + "</span></div>"
  ).join("");

  let resultHtml;
  if (r.result.type === "ร.") {
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge bad'>ร.</span></div>" +
      "<div class='result-note'>เหตุผล: " + r.result.reason + "</div>";
  } else if (r.result.type === "มส.") {
    const isRetake = r.result.subtype === "retake";
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge bad'>มส.</span></div>" +
      "<div class='result-note'>ขาดไปแล้ว " + r.result.missedPeriods + " คาบ (เพดาน " + r.result.maxMissed.toFixed(1) + " คาบ) — " +
      (isRetake
        ? "<b>ต้องเรียนซ้ำรายวิชา</b> (ขาดเกินเพดานเรียนซ้ำแล้ว ชั่วโมงชดเชยช่วยไม่ได้)"
        : "เรียนเพิ่มเติมให้ครบเวลาได้" +
          (r.result.makeupTotal > 0 ? " — ชดเชยไปแล้ว " + r.result.makeupTotal + " คาบ (ขาดสุทธิเหลือ " + r.result.netMissed + " คาบ) ยังไม่พอ" : "")) +
      "</div>";
  } else {
    const g = r.result.grade;
    const badgeClass = g >= 3 ? "good" : (g >= 1.5 ? "mid" : "bad");
    resultHtml =
      "<div class='result-line'><span>ผลการเรียน</span><span class='badge " + badgeClass + "'>เกรด " + g + "</span></div>" +
      "<div class='result-note'>คิดจาก " + r.result.percentScore.toFixed(1) + "% ของคะแนนเต็มวิชา" +
      (r.result.makeupTotal > 0 ? " · ขาดไม่เกินเพดานแล้วหลังนับชั่วโมงชดเชย " + r.result.makeupTotal + " คาบ" : "") + "</div>";
  }

  return (
    "<div class='card student-card'>" +
      "<div class='student-head'>" +
        "<span class='name'>" + stu.name + "</span>" +
        "<span class='meta'>เลขที่ " + stu.student_no + (stu.classroom ? " · " + stu.classroom : "") + "</span>" +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>คะแนนวิชา</div>" +
        (subjectRows || "<div class='hint'>ยังไม่มีหน่วยคะแนนวิชา</div>") +
        "<div class='score-row total'><span>รวมวิชา</span><span class='val'>" +
          r.subjectScaled.toFixed(1) + " / " + currentSubject.max_score + "</span></div>" +
      "</div>" +
      "<div class='section'>" +
        "<div class='section-title'>สมรรถนะหลัก 6 ด้าน</div>" +
        (compGrid ? "<div class='comp-grid'>" + compGrid + "</div>" : "<div class='hint'>ยังไม่มีข้อมูลสมรรถนะหลัก</div>") +
      "</div>" +
      "<div class='section'>" + resultHtml + "</div>" +
    "</div>"
  );
}

// เริ่มทำงาน
loadSubjects();
</script>
